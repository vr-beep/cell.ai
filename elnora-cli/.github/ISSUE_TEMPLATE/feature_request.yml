name: Feature Request
description: Suggest a new command or capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: command
    attributes:
      label: What command or capability?
      description: Name the command or area of functionality this relates to.
      placeholder: "e.g., elnora protocols generate, elnora files upload, batch operations"
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe what you're trying to accomplish. What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe how the feature would work from your perspective as a user.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false
